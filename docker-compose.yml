services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - DRONEIMPACT_HOST=0.0.0.0
      - DRONEIMPACT_PORT=8000
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - DRONEIMPACT_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
