version: "1.0"

physics:
  n_monte_carlo_samples: 2000
  evaluation_spacing_m: 500
  shahed136:
    mass_kg: 200.0
    warhead_mass_kg: 45.0
    cruise_speed_m_s: 51.4
    glide_ratio: 5.0
    drag_coeff_tumbling: 0.8
    reference_area_m2: 3.5
    fragment_reference_area_m2: 0.5
    fragment_mass_mean_kg: 50.0
    fragment_mass_std_kg: 10.0
  m1_sigma_heading_deg: 5.0
  m1_sigma_glide_ratio: 0.8
  m2_sigma_init_deg: 30.0
  m2_sigma_turn_deg_per_s: 15.0
  m2_dt_s: 1.0
  m2_max_time_s: 300.0
  m2_descent_rate_m_s: 1.5
  m2_power_duration_min_s: 1.0
  m2_power_duration_max_s: 10.0
  m3_heading_spread_deg: 60.0
  m3_sigma_speed_m_s: 10.0
  m3_speed_reduction_factor: 0.7
  m3_sigma_cd: 0.15
  m3_dt_s: 0.1
  m3_max_steps: 1000
  m3_pitch_range_deg: 20.0
  atmosphere_scale_height_m: 8500.0

engagement:
  p_kill: 0.50
  high_risk_threshold: 0.5
  mode_weights:
    propulsion_loss: 0.40
    loss_of_control: 0.35
    break_apart: 0.25
  mode_enable:
    propulsion_loss: true
    loss_of_control: true
    break_apart: false

casualty:
  blast:
    tnt_equivalent_kg: 30.0
    lethal_radius_m: 5.0
    injury_radius_m: 80.0
    p_lethal: 0.9
    p_injury: 0.3
  fragmentation:
    lethal_radius_m: 200.0
    danger_radius_m: 400.0
    p_frag_lethal: 0.5
    p_frag_danger: 0.1
  blast_bands:
    - {radius_m: 5, probability: 1.00}
    - {radius_m: 15, probability: 0.50}
    - {radius_m: 35, probability: 0.10}
    - {radius_m: 80, probability: 0.01}
  frag_bands:
    - {radius_m: 20, probability: 1.00}
    - {radius_m: 80, probability: 0.30}
    - {radius_m: 200, probability: 0.10}
    - {radius_m: 400, probability: 0.02}
  infrastructure:
    penalty_radius_m: 500.0
    max_penalty: 10.0
    weights:
      power_plant: 5.0
      hospital: 4.0
      water_works: 4.0
      bridge: 3.0
      school: 2.0

scoring:
  population_empty_threshold: 0.0
  population_high_risk_threshold: 50.0
  dense_spacing_m: 50.0
  miss_cache_agl_round_m: 10.0
  miss_cache_heading_round_deg: 1.0
  zone_caution_threshold: 0.1
  zone_nogo_threshold: 1.0

data:
  population_path: "./data/kontur_ukraine.gpkg"
  dem_path: "./data/ukraine_dem.tif"
  infrastructure_path: "./data/ukraine_infra.geojson"

dashboard:
  api_endpoint: "http://localhost:8000"
  default_max_range_m: 250000
  default_evaluation_spacing_m: 500
  cache_ttl_sec: 300

scenarios:
  - name: "Bryansk → Kyiv"
    description: "Overland from Bryansk, Russia — long-range approach to Kyiv through low-density terrain"
    trajectory:
      lat: 52.0
      lon: 33.5
      altitude_m: 400
      heading_deg: 230.0
      speed_m_s: 51.4
    max_range_m: 250000

  - name: "Belgorod → Kharkiv"
    description: "Short-range cross-border from Belgorod — urban impact within 80 km"
    trajectory:
      lat: 50.5
      lon: 36.8
      altitude_m: 400
      heading_deg: 215.0
      speed_m_s: 51.4
    max_range_m: 100000

  - name: "Crimea → Mykolaiv"
    description: "Overland from northern Crimea through Kherson oblast toward Mykolaiv"
    trajectory:
      lat: 46.2
      lon: 33.8
      altitude_m: 400
      heading_deg: 302.0
      speed_m_s: 51.4
    max_range_m: 200000

  - name: "Rostov → Dnipro"
    description: "East-to-west overland from Rostov — long flight over Zaporizhzhia oblast toward Dnipro"
    trajectory:
      lat: 48.0
      lon: 38.0
      altitude_m: 400
      heading_deg: 283.0
      speed_m_s: 51.4
    max_range_m: 250000

  - name: "Black Sea → Odesa"
    description: "Maritime approach from the south — crosses coastline into dense port city of Odesa"
    trajectory:
      lat: 46.0
      lon: 31.5
      altitude_m: 400
      heading_deg: 313.0
      speed_m_s: 51.4
    max_range_m: 150000

  - name: "Black Sea → Kyiv"
    description: "Long-range maritime launch — overflies Kherson and Mykolaiv oblasts then north to Kyiv"
    trajectory:
      lat: 45.5
      lon: 32.0
      altitude_m: 400
      heading_deg: 349.0
      speed_m_s: 51.4
    max_range_m: 250000
