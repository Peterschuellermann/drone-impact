    description: "5 drones detected on south-east corridor toward Kyiv from Bryansk"
    drones:
      - drone_id: "shahed-1"
        lat: 52.0
        lon: 33.5
        altitude_m: 350
        heading_deg: 230
        speed_m_s: 51.4
      - drone_id: "shahed-2"
        lat: 51.8
        lon: 33.8
        altitude_m: 400
        heading_deg: 235
        speed_m_s: 51.4
      - drone_id: "shahed-3"
        lat: 51.6
        lon: 33.2
        altitude_m: 380
        heading_deg: 228
        speed_m_s: 51.4
      - drone_id: "shahed-4"
        lat: 52.2
        lon: 33.0
        altitude_m: 420
        heading_deg: 232
        speed_m_s: 51.4
      - drone_id: "shahed-5"
        lat: 51.4
        lon: 33.6
        altitude_m: 360
        heading_deg: 240
        speed_m_s: 51.4

  - name: "Dual corridor — Kharkiv + Dnipro"
    description: "3 drones toward Kharkiv from Belgorod, 2 toward Dnipro from Rostov"
    drones:
      - drone_id: "kharkiv-1"
        lat: 50.5
        lon: 36.8
        altitude_m: 400
        heading_deg: 215
        speed_m_s: 51.4
      - drone_id: "kharkiv-2"
        lat: 50.3
        lon: 37.0
        altitude_m: 380
        heading_deg: 220
        speed_m_s: 51.4
      - drone_id: "kharkiv-3"
        lat: 50.7
        lon: 36.6
        altitude_m: 420
        heading_deg: 210
        speed_m_s: 51.4
      - drone_id: "dnipro-1"
        lat: 48.0
        lon: 38.0
        altitude_m: 400
        heading_deg: 283
        speed_m_s: 51.4
      - drone_id: "dnipro-2"
        lat: 47.8
        lon: 38.3
        altitude_m: 380
        heading_deg: 278
