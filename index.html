<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Impact — Where NOT to Shoot</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0b0f1a;
      color: #e4e8f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 720px;
      padding: 3rem 2rem;
      text-align: center;
    }

    .challenge {
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 0.85rem;
      color: #f59e0b;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: 1.15rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .team {
      display: flex;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .member {
      text-align: center;
    }

    .member .name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .member .email {
      font-size: 0.9rem;
      color: #64748b;
    }

    .member .email a {
      color: #38bdf8;
      text-decoration: none;
    }

    .member .email a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: auto;
      padding: 2rem;
      font-size: 0.8rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="challenge">Challenge: Where NOT to Shoot</p>
    <h1>Drone Impact</h1>
    <p class="tagline">
      Physics-based intercept analysis for drone defense.
      Simulating blast, fragmentation, and debris to find the safest engagement point.
    </p>

    <div class="team">
      <div class="member">
        <p class="name">Abbe Hameshli</p>
        <p class="email"><a href="mailto:abbe@example.com">abbe@example.com</a></p>
      </div>
      <div class="member">
        <p class="name">Peter Sch&uuml;llermann</p>
        <p class="email"><a href="mailto:peter@example.com">peter@example.com</a></p>
      </div>
    </div>
  </div>

  <footer>Hackathon 2026</footer>

</html>
